id: lead-pipeline-app
name: lead-pipeline-app
version: 1.0.0
services:
  auth:
    enabled: true
    fabric:
      enabled: true
    password:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5173
      - https://<app-url>.webapp.fabricapps.net
  data:
    enabled: true
    dialect: mssql
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build:fabric
    indexDocument: index.html
  storage:
    enabled: false
  functions:
    enabled: false
